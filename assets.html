<script>
/* ═══════════════════════════════════════════════════════════════
   SECURITY UTILITIES
   Source: Old code — identical
════════════════════════════════════════════════════════════════ */
function h(s){if(s===null||s===undefined)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#x27;');}
function safeUrl(url){if(!url||typeof url!=='string')return null;try{const u=new URL(url);if(u.protocol!=='http:'&&u.protocol!=='https:')return null;return url;}catch{return null;}}
function safeOpen(url){const s=safeUrl(url);if(!s){showToast('error','Invalid URL','Only http/https links allowed.');return;}window.open(s,'_blank','noopener,noreferrer');}

/* ═══════════════════════════════════════════════════════════════
   SESSION / AUTH
   Source: Old code getSession(), logout()
   Endpoints: POST /api/auth/logout (via SapSession or manual)
════════════════════════════════════════════════════════════════ */
function getSession(){
  if(typeof SapSession!=='undefined') return SapSession.get();
  try{
    const s=sessionStorage.getItem('sap_session');
    if(!s){window.location.href='/';return null;}
    return JSON.parse(s);
  }catch(e){window.location.href='/';return null;}
}
function logout(){
  if(typeof SapSession!=='undefined'){SapSession.logout();return;}
  const s=JSON.parse(sessionStorage.getItem('sap_session')||'{}');
  /* ── API: POST /api/auth/logout ── */
  fetch('/api/auth/logout',{
    method:'POST',
    headers:s.token?{'Authorization':'Bearer '+s.token}:{},
  }).catch(()=>{});
  sessionStorage.removeItem('sap_session');
  window.location.href='/';
}

/* ── User menu toggle ── */
function toggleUserMenu(){document.getElementById('userMenu').classList.toggle('open');}
document.addEventListener('click',e=>{
  if(!e.target.closest('#shellAvatar')&&!e.target.closest('#userMenu'))
    document.getElementById('userMenu').classList.remove('open');
});

/* ═══════════════════════════════════════════════════════════════
   FUNCTIONAL LOCATIONS
   Source: Old code loadFuncLocsFromAPI(), saveInlineFuncLoc()
   Endpoints:
     GET  /api/functional-locations?status=active&limit=200
     POST /api/functional-locations
════════════════════════════════════════════════════════════════ */
const FL_KEY='sap_functional_locations';
window._funcLocsCache=[];
function loadFuncLocs(){return window._funcLocsCache||[];}

async function loadFuncLocsFromAPI(){
  try{
    /* ── API: GET /api/functional-locations?status=active&limit=200 ── */
    const res=await apiFetch('/api/functional-locations?status=active&limit=200');
    const data=await res.json();
    window._funcLocsCache=(data.data?.functional_locations||data.data||[]).map(l=>({
      ...l,
      id:l.fl_id||l.id,
      name:l.name,
      type:l.type,
      client:l.client_id||'',
      desc:l.notes||'',
    }));
  }catch(e){
    console.warn('loadFuncLocsFromAPI failed:',e);
    window._funcLocsCache=window._funcLocsCache||[];
  }
  populateToolbarLocationFilter();
}

function populateFuncLocDropdown(selectedValue,filterClient){
  const sel=document.getElementById('f_location');
  if(!sel)return;
  let locs=loadFuncLocs();
  if(filterClient)locs=locs.filter(l=>!l.client||l.client===filterClient);
  sel.innerHTML='<option value="">Select location…</option>'+
    locs.map(l=>`<option value="${l.name}" ${l.name===selectedValue?'selected':''}>${l.name} (${l.type})</option>`).join('');
}
function onAssetClientChange(){
  const cv=document.getElementById('f_client')?.value||session?.customerId||null;
  const cur=document.getElementById('f_location')?.value||'';
  populateFuncLocDropdown(cur,cv);
}
function openInlineAddFuncLoc(){
  document.getElementById('inlineFuncLocForm').style.display='block';
  document.getElementById('addFuncLocBtn').style.display='none';
  document.getElementById('inline_loc_name').value='';
  document.getElementById('inline_loc_desc').value='';
  document.getElementById('inline_loc_type').value='Rig';
  setTimeout(()=>document.getElementById('inline_loc_name').focus(),50);
}
function closeInlineAddFuncLoc(){
  document.getElementById('inlineFuncLocForm').style.display='none';
  document.getElementById('addFuncLocBtn').style.display='inline-flex';
}
async function saveInlineFuncLoc(){
  const name=document.getElementById('inline_loc_name').value.trim();
  const type=document.getElementById('inline_loc_type').value;
  const desc=document.getElementById('inline_loc_desc').value.trim();
  if(!name){showToast('error','Required','Please enter a location name.');return;}
  const locs=loadFuncLocs();
  if(locs.find(l=>l.name.toLowerCase()===name.toLowerCase())){
    showToast('error','Duplicate',`"${name}" already exists.`);return;
  }
  const cv=document.getElementById('f_client')?.value||session?.customerId||'';
  try{
    /* ── API: POST /api/functional-locations ── */
    const res=await apiFetch('/api/functional-locations',{
      method:'POST',
      body:JSON.stringify({
        fl_id:'FL-'+Date.now().toString().slice(-4),
        name,type,status:'active',
        client_id:cv||null,
        notes:desc||null,
      })
    });
    const data=await res.json();
    if(!data.success){
      showToast('error','Failed',(data.data||data).error||'Could not create location.');return;
    }
    await loadFuncLocsFromAPI();
    populateFuncLocDropdown(name,cv||null);
    closeInlineAddFuncLoc();
    showToast('success','Location Added',`"${name}" created and selected.`);
  }catch(e){
    showToast('error','Network Error','Could not save location.');
  }
}

/* ═══════════════════════════════════════════════════════════════
   CLIENTS
   Source: Old code loadClients()
   Endpoint: GET /api/clients?status=active&limit=200
════════════════════════════════════════════════════════════════ */
async function loadClients(){
  try{
    /* ── API: GET /api/clients?status=active&limit=200 ── */
    const res=await apiFetch('/api/clients?status=active&limit=200');
    const data=await res.json();
    const list=(data.data?.clients||data.data||[]);

    Object.keys(CLIENTS_MAP).forEach(k=>delete CLIENTS_MAP[k]);
    list.forEach(c=>{CLIENTS_MAP[c.client_id]=c.name;});

    const opt=c=>`<option value="${c.client_id}">${c.name} (${c.client_id})</option>`;

    const tb=document.getElementById('clientFilter');
    if(tb){const cv=tb.value;tb.innerHTML='<option value="all">All Clients</option>'+list.map(opt).join('');if(cv)tb.value=cv;populateToolbarLocationFilter();}

    const md=document.getElementById('f_client');
    if(md){const cv2=md.value;md.innerHTML='<option value="">Select client…</option>'+list.map(opt).join('');if(cv2)md.value=cv2;}
  }catch(e){console.warn('loadClients failed:',e);}
}

function populateToolbarLocationFilter(){
  const sel=document.getElementById('locationFilter');
  if(!sel)return;
  const role=session?.role||'user';
  const cur=sel.value||'all';
  const cf=document.getElementById('clientFilter')?.value||'all';
  let locs=loadFuncLocs();
  if(role==='user'||role==='technician')locs=locs.filter(l=>!session?.customerId||l.client===session.customerId);
  else if(cf!=='all')locs=locs.filter(l=>!l.client||l.client===cf);
  const names=[...new Set(locs.map(l=>l.name).filter(Boolean))].sort();
  sel.innerHTML='<option value="all">All Locations</option>'+names.map(n=>`<option value="${n}">${n}</option>`).join('');
  sel.value=[...sel.options].some(o=>o.value===cur)?cur:'all';
}
function onClientToolbarChange(){populateToolbarLocationFilter();applyFilters();}

/* ═══════════════════════════════════════════════════════════════
   INSPECTION DATE MAP (for date filter + KPI)
   Source: Old code loadInspectionDateMap()
   Endpoint: GET /api/certificates?limit=2000
════════════════════════════════════════════════════════════════ */
async function loadInspectionDateMap(){
  const out=new Map();
  try{
    /* ── API: GET /api/certificates?limit=2000 ── */
    const res=await apiFetch('/api/certificates?limit=2000');
    const payload=await res.json();
    const d=payload.data||payload;
    const certs=Array.isArray(d.certificates)?d.certificates:(Array.isArray(d)?d:[]);
    certs.forEach(c=>{
      const aid=c.asset_id;const idate=c.issue_date||'';
      if(!aid||!idate)return;
      if(!out.has(aid)||String(out.get(aid))<String(idate))out.set(aid,idate);
    });
  }catch(e){console.warn('loadInspectionDateMap failed:',e);}
  return out;
}

/* ═══════════════════════════════════════════════════════════════
   LOAD ASSETS (primary data fetch)
   Source: Old code loadAssets()
   Endpoints:
     GET /api/assets?limit=500        (main)
     GET /api/certificates?limit=2000 (sidecar for date map)
════════════════════════════════════════════════════════════════ */
async function loadAssets(){
  try{
    const params=new URLSearchParams({limit:'500'});
    /* ── API: GET /api/assets?limit=500 ── */
    /* ── API: GET /api/certificates?limit=2000 (sidecar) ── */
    const [res,inspectionMap]=await Promise.all([
      apiFetch('/api/assets?'+params),
      loadInspectionDateMap(),
    ]);
    const data=await res.json();
    const d=data.data||data;
    ASSETS=(d.assets||d||[]).map(a=>({
      ...a,
      assetId:a.asset_number||a.id,
      type:a.asset_type||'',
      serial:a.serial_number||'',
      location:a.functional_location||'',
      client:a.client_id||'',
      zone:a.description||'',
      zoneEquipment:a.description||'',
      notes:a.notes||'',
      appliedStandard:a.applied_standard||'',
      inspectionDate:inspectionMap.get(a.id)||'',
    }));
  }catch(e){
    console.warn('loadAssets failed:',e);
    ASSETS=[];
  }
  updateKPIs();
  renderTable();
  syncAssetsToStorage();
}

/* ── Sync snapshot for functional-locations.html ── */
function syncAssetsToStorage(){
  try{
    const snapshot=ASSETS.map(a=>({assetId:a.assetId,location:a.location}));
    localStorage.setItem('sap_assets_data',JSON.stringify(snapshot));
  }catch(e){}
}

/* ═══════════════════════════════════════════════════════════════
   KPI CARDS
   Source: New — derived from ASSETS array after loadAssets()
════════════════════════════════════════════════════════════════ */
function updateKPIs(){
  const total=ASSETS.length;
  const active=ASSETS.filter(a=>a.status==='operation').length;
  const stacked=ASSETS.filter(a=>a.status==='stacked').length;
  document.getElementById('kpiTotal').textContent=total;
  document.getElementById('kpiActive').textContent=active;
  document.getElementById('kpiStacked').textContent=stacked;

  /* Expiring certs KPI — from localStorage cert data */
  try{
    const raw=localStorage.getItem('sap_certs_data');
    if(raw){
      const certs=JSON.parse(raw);
      const today=new Date();today.setHours(0,0,0,0);
      const expiring=certs.filter(c=>{
        if(c.approvalStatus!=='approved')return false;
        const exp=new Date(c.expiryDate);exp.setHours(0,0,0,0);
        const days=Math.ceil((exp-today)/86400000);
        return days>=0&&days<=30;
      }).length;
      if(expiring>0){
        document.getElementById('kpiExpiringCard').style.display='';
        document.getElementById('kpiExpiring').textContent=expiring;
      }
    }
  }catch(e){}
}

/* ═══════════════════════════════════════════════════════════════
   RENDER TABLE
   Source: Old code renderTable() — adapted to new CSS classes
════════════════════════════════════════════════════════════════ */
function renderTable(){
  const role=session.role;
  const search=(document.getElementById('searchInput').value||'').toLowerCase();
  const clientF=document.getElementById('clientFilter').value||'all';
  const typeF=document.getElementById('typeFilter').value||'all';
  const locF=document.getElementById('locationFilter')?.value||'all';
  const inspDateF=document.getElementById('inspectionDateFilter')?.value||'';

  let data=[...ASSETS];

  /* Client scope */
  if(session.customerId&&role!=='admin'&&role!=='manager'){
    data=data.filter(a=>a.client===session.customerId);
  }else if(clientF!=='all'){
    data=data.filter(a=>a.client===clientF);
  }

  if(activeStatusFilter!=='all')data=data.filter(a=>a.status===activeStatusFilter);
  if(typeF!=='all')data=data.filter(a=>a.type===typeF);
  if(locF!=='all')data=data.filter(a=>a.location===locF);
  if(inspDateF)data=data.filter(a=>(a.inspectionDate||'')===inspDateF);

  if(search)data=data.filter(a=>
    a.name.toLowerCase().includes(search)||
    a.assetId.toLowerCase().includes(search)||
    a.serial.toLowerCase().includes(search)||
    a.location.toLowerCase().includes(search)||
    a.type.toLowerCase().includes(search)
  );

  /* Sort */
  data.sort((a,b)=>{
    const av=(a[sortCol]||'').toString().toLowerCase();
    const bv=(b[sortCol]||'').toString().toLowerCase();
    return av<bv?-sortDir:av>bv?sortDir:0;
  });

  filteredData=data;
  const total=data.length;
  const start=(currentPage-1)*PAGE_SIZE;
  const end=Math.min(start+PAGE_SIZE,total);
  const page=data.slice(start,end);

  /* Update sort indicators */
  document.querySelectorAll('.data-table th.sortable').forEach(th=>{
    th.classList.toggle('sorted',th.dataset.col===sortCol);
    const arrow=th.querySelector('.sort-arrow');
    if(arrow)arrow.textContent=th.dataset.col===sortCol?(sortDir===1?'↑':'↓'):'↕';
  });

  const tbody=document.getElementById('assetTableBody');
  const empty=document.getElementById('emptyState');

  if(!page.length){
    tbody.innerHTML='';
    empty.style.display='block';
    document.getElementById('paginationInfo').textContent='No results';
    document.getElementById('paginationControls').innerHTML='';
    return;
  }

  empty.style.display='none';
  document.getElementById('paginationInfo').textContent=`Showing ${start+1}–${end} of ${total}`;

  const canEdit=role==='admin'||role==='manager';
  const canDelete=role==='admin';
  const isTech=role==='technician';
  const showClient=role==='admin'||role==='manager';

  tbody.innerHTML=page.map(a=>{
    const tc=TYPE_COLORS[a.type]||{'bg':'var(--neutral-50)','color':'var(--neutral-500)'};
    const statusDot=a.status==='operation'?'status-dot--active':'status-dot--stacked';
    const statusLabel=a.status==='operation'?'Operation':'Stacked';
    return `
    <tr>
      <td class="cell-check"><input type="checkbox" class="chk" data-id="${a.assetId}" onchange="updateMassBar()"/></td>
      <td data-col="assetId"><span class="id-chip">${a.assetId}</span></td>
      <td data-col="name">
        <div class="asset-name" onclick="openDrawer('${a.assetId}')">${h(a.name)}</div>
        ${a.zone?`<div class="asset-zone">${h(a.zone)}</div>`:''}
      </td>
      <td data-col="type"><span class="type-badge" style="background:${tc.bg};color:${tc.color};">${a.type}</span></td>
      <td data-col="serial" class="hide-mobile" style="font-family:monospace;font-size:12px;color:var(--text-secondary);">${h(a.serial)||'—'}</td>
      <td data-col="location" class="hide-mobile" style="font-size:12px;">${h(a.location)}</td>
      <td data-col="status">
        <span class="status-indicator"><span class="status-dot ${statusDot}"></span>${statusLabel}</span>
        ${isTech&&a._pendingStatus?`<div class="approval-badge" style="margin-top:3px;">⏳ Pending</div>`:''}
      </td>
      <td data-col="client" id="clientCol_${a.assetId}">${showClient?`<span style="font-size:12px;font-weight:600;">${CLIENTS_MAP[a.client]||a.client}</span><br/><span class="id-chip">${a.client}</span>`:`<span class="id-chip">${a.client}</span>`}</td>
      <td>
        <div class="row-actions">
          <button class="btn-icon" onclick="openDrawer('${a.assetId}')" title="View">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
          ${canEdit?`
          <button class="btn-icon" onclick="openEditModal('${a.assetId}')" title="Edit">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button class="btn-icon btn-icon--success" onclick="openTransferModal('${a.assetId}')" title="Transfer">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 014-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg>
          </button>`:''}
          ${isTech?`
          <button class="btn-icon btn-icon--warning" onclick="openStatusModal('${a.assetId}')" title="Request Status Change">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          </button>`:''}
          ${canDelete?`
          <button class="btn-icon btn-icon--danger" onclick="openDeleteModal('${a.assetId}')" title="Delete">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
          </button>`:''}
        </div>
      </td>
    </tr>`;
  }).join('');

  renderPagination(total);
  applyColVis();
  applyClientColVis();
}

function applyClientColVis(){
  const hide=(session?.role==='user');
  const th=document.querySelector('th[data-col="client"]');
  if(th)th.style.display=hide?'none':'';
  document.querySelectorAll('td[data-col="client"]').forEach(td=>{td.style.display=hide?'none':' ';});
  const cw=document.getElementById('col_client_wrap');
  if(cw)cw.closest('label').style.display=hide?'none':'';
}

/* ═══════════════════════════════════════════════════════════════
   PAGINATION
   Source: Old code renderPagination(), goPage(), setPageSize()
════════════════════════════════════════════════════════════════ */
function renderPagination(total){
  const tp=Math.ceil(total/PAGE_SIZE);
  const ctrl=document.getElementById('paginationControls');
  let html=`<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;
  for(let i=1;i<=tp;i++){
    if(tp>7&&Math.abs(i-currentPage)>2&&i!==1&&i!==tp){
      if(i===2||i===tp-1)html+=`<span style="padding:0 4px;color:var(--text-tertiary);">…</span>`;
      continue;
    }
    html+=`<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
  }
  html+=`<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===tp?'disabled':''}>›</button>`;
  ctrl.innerHTML=html;
}
function goPage(p){const mx=Math.ceil(filteredData.length/PAGE_SIZE);if(p<1||p>mx)return;currentPage=p;renderTable();}
function setPageSize(v){const n=Number(v);if(![25,50,100].includes(n))return;PAGE_SIZE=n;localStorage.setItem('sap_assets_page_size',String(n));currentPage=1;renderTable();}

/* ═══════════════════════════════════════════════════════════════
   FILTERS & SORT
   Source: Old code filterStatusFromDropdown(), sortTable(), applyFilters()
════════════════════════════════════════════════════════════════ */
function filterStatusDD(el){
  const cbs=document.querySelectorAll('#statusDropdown input[type="checkbox"]');
  const allCb=Array.from(cbs).find(cb=>cb.dataset.status==='all');
  if(el.dataset.status==='all'){
    if(el.checked){cbs.forEach(cb=>cb.checked=false);el.checked=true;activeStatusFilter='all';document.getElementById('statusFilterLabel').textContent='All Status';}
    else{el.checked=true;}
  }else{
    allCb.checked=false;
    const checked=Array.from(cbs).filter(cb=>cb.checked&&cb.dataset.status!=='all');
    if(!checked.length){allCb.checked=true;activeStatusFilter='all';document.getElementById('statusFilterLabel').textContent='All Status';}
    else if(checked.length===1){activeStatusFilter=checked[0].dataset.status;document.getElementById('statusFilterLabel').textContent=checked[0].nextElementSibling.textContent.trim();}
    else{activeStatusFilter='multiple';document.getElementById('statusFilterLabel').textContent=checked.length+' selected';}
  }
  currentPage=1;renderTable();
}
function sortTable(col){if(sortCol===col)sortDir*=-1;else{sortCol=col;sortDir=1;}renderTable();}
function applyFilters(){currentPage=1;renderTable();}

/* ═══════════════════════════════════════════════════════════════
   DROPDOWN TOGGLE (generic)
   Source: Old code toggleStatusDropdown(), toggleColDropdown(), etc.
════════════════════════════════════════════════════════════════ */
function toggleDD(id){
  const el=document.getElementById(id);
  if(!el)return;
  const isOpen=el.classList.contains('open');
  /* Close all dropdowns first */
  document.querySelectorAll('.dropdown-panel.open').forEach(d=>d.classList.remove('open'));
  if(!isOpen)el.classList.add('open');
}
document.addEventListener('click',e=>{
  if(!e.target.closest('.dropdown-wrap'))
    document.querySelectorAll('.dropdown-panel.open').forEach(d=>d.classList.remove('open'));
});

/* ═══════════════════════════════════════════════════════════════
   COLUMN VISIBILITY
   Source: Old code applyColVisibility(), resetColumns(), loadColState()
════════════════════════════════════════════════════════════════ */
const COL_KEYS=['assetId','type','serial','location','status','client'];
function applyColVis(){
  COL_KEYS.forEach(key=>{
    const cb=document.getElementById('col_'+key);
    const show=cb?cb.checked:true;
    const th=document.querySelector(`th[data-col="${key}"]`);
    if(th)th.style.display=show?'':'none';
    document.querySelectorAll(`td[data-col="${key}"]`).forEach(td=>{td.style.display=show?'':'none';});
  });
  const state={};
  COL_KEYS.forEach(k=>{const cb=document.getElementById('col_'+k);if(cb)state[k]=cb.checked;});
  localStorage.setItem('asset_col_state',JSON.stringify(state));
}
function resetColumns(){COL_KEYS.forEach(k=>{const cb=document.getElementById('col_'+k);if(cb)cb.checked=true;});applyColVis();}
function loadColState(){
  try{
    const saved=JSON.parse(localStorage.getItem('asset_col_state')||'{}');
    COL_KEYS.forEach(k=>{const cb=document.getElementById('col_'+k);if(cb&&saved[k]!==undefined)cb.checked=saved[k];});
  }catch(e){}
  applyColVis();
}

/* ═══════════════════════════════════════════════════════════════
   MASS ACTIONS (Select All, Status Change, Delete)
   Source: Old code toggleSelectAll(), updateMassBar(), massChangeStatus(), massDelete()
   Endpoints:
     PATCH /api/assets/{uuid}  (status change)
     DELETE /api/assets/{uuid}  (delete)
════════════════════════════════════════════════════════════════ */
function toggleSelectAll(cb){
  document.querySelectorAll('#assetTableBody input[type="checkbox"]').forEach(c=>c.checked=cb.checked);
  const sa=document.getElementById('selectAllMass');if(sa)sa.checked=cb.checked;
  updateMassBar();
}
function getSelectedIds(){return[...document.querySelectorAll('#assetTableBody input[type="checkbox"]:checked')].map(cb=>cb.getAttribute('data-id'));}
function updateMassBar(){
  const ids=getSelectedIds();
  const bar=document.getElementById('massActionBar');
  if(!bar)return;
  if(!ids.length){bar.classList.remove('visible');const sa=document.getElementById('selectAll');if(sa)sa.checked=false;const sa2=document.getElementById('selectAllMass');if(sa2)sa2.checked=false;return;}
  bar.classList.add('visible');
  document.getElementById('massCount').textContent=`${ids.length} selected`;
  const role=session?.role;
  const delBtn=document.getElementById('massDeleteBtn');
  const statusWrap=document.getElementById('massStatusWrap');
  if(delBtn)delBtn.style.display=(role==='admin')?'inline-flex':'none';
  if(statusWrap)statusWrap.style.display=(role==='admin'||role==='manager')?'block':'none';
}
function clearSelection(){
  document.querySelectorAll('#assetTableBody input[type="checkbox"]').forEach(c=>c.checked=false);
  const sa=document.getElementById('selectAll');if(sa)sa.checked=false;
  const sa2=document.getElementById('selectAllMass');if(sa2)sa2.checked=false;
  updateMassBar();
}

async function massChangeStatus(newStatus){
  const ids=getSelectedIds();if(!ids.length)return;
  document.querySelectorAll('.dropdown-panel.open').forEach(d=>d.classList.remove('open'));
  try{
    const results=await Promise.all(ids.map(id=>{
      const asset=ASSETS.find(a=>a.assetId===id);
      const uuid=asset?.id||id;
      /* ── API: PATCH /api/assets/{uuid} ── */
      return apiFetch(`/api/assets/${uuid}`,{method:'PATCH',body:JSON.stringify({status:newStatus})}).then(r=>r.json());
    }));
    const failed=results.filter(r=>!r.success).length;
    if(failed)showToast('warning','Partial Update',`${ids.length-failed} updated, ${failed} failed.`);
    else showToast('success','Status Updated',`${ids.length} asset${ids.length>1?'s':''} set to "${newStatus}".`);
    clearSelection();await loadAssets();
  }catch(err){showToast('error','Network Error','Could not update status.');}
}

async function massDelete(){
  const ids=getSelectedIds();if(!ids.length)return;
  if(!confirm(`Delete ${ids.length} selected asset${ids.length>1?'s':''}? This cannot be undone.`))return;
  try{
    const results=await Promise.all(ids.map(id=>{
      const asset=ASSETS.find(a=>a.assetId===id);
      const uuid=asset?.id||id;
      /* ── API: DELETE /api/assets/{uuid} ── */
      return apiFetch(`/api/assets/${uuid}`,{method:'DELETE'}).then(r=>r.json());
    }));
    const failed=results.filter(r=>!r.success).length;
    if(failed)showToast('warning','Partial Delete',`${ids.length-failed} deleted, ${failed} failed.`);
    else showToast('success','Deleted',`${ids.length} asset${ids.length>1?'s':''} deleted.`);
    clearSelection();await loadAssets();
  }catch(err){showToast('error','Network Error','Could not delete assets.');}
}

   Source: Old code openAddModal(), openEditModal(), saveAsset()

function getNextAssetNumberPreview(){
  let max=0;
  ASSETS.forEach(a=>{const m=String(a.assetId||'').toUpperCase().match(/^AST-(\d+)$/);if(m){const n=parseInt(m[1],10);if(!isNaN(n)&&n>max)max=n;}});
  return `AST-${String(max+1).padStart(4,'0')}`;
}
function onTypeChange(){const v=document.getElementById('f_type').value;const w=document.getElementById('appliedStandardWrap');if(w)w.style.display=v?'block':'none';}

async function openAddModal(){
  document.getElementById('editAssetId').value='';
  document.getElementById('assetForm').reset();
  document.getElementById('f_assetNumber').value=getNextAssetNumberPreview();
  onTypeChange();closeInlineAddFuncLoc();
  document.getElementById('modalTitle').textContent='Add New Asset';

  await Promise.all([loadClients(),loadFuncLocsFromAPI()]);

  document.getElementById('statusApprovalNote').style.display=session.role==='technician'?'block':'none';
  if(session.customerId){document.getElementById('f_client').value=session.customerId;document.getElementById('f_client_wrap').style.display='none';}
  else{document.getElementById('f_client_wrap').style.display='';}
  const sc=document.getElementById('f_client')?.value||session?.customerId||null;
  populateFuncLocDropdown('',sc);
  document.getElementById('assetModal').classList.add('open');
}

async function openEditModal(id){
  const a=ASSETS.find(x=>x.assetId===id);if(!a)return;
  document.getElementById('editAssetId').value=id;
  document.getElementById('f_assetNumber').value=a.assetId||'';
  document.getElementById('f_name').value=a.name;
  document.getElementById('f_type').value=a.type;
  document.getElementById('f_serial').value=a.serial;
  document.getElementById('f_appliedStandard').value=a.appliedStandard||'';
  onTypeChange();
  document.getElementById('f_status').value=a.status;
  document.getElementById('f_zone_equipment').value=a.zoneEquipment||a.zone||'';

  await Promise.all([loadClients(),loadFuncLocsFromAPI()]);

  populateFuncLocDropdown(a.location,a.client||session?.customerId||null);
  closeInlineAddFuncLoc();
  document.getElementById('f_client').value=a.client;
  document.getElementById('f_notes').value=a.notes;
  document.getElementById('modalTitle').textContent='Edit Asset';
  document.getElementById('statusApprovalNote').style.display='none';
  if(session.customerId)document.getElementById('f_client_wrap').style.display='none';
  document.getElementById('assetModal').classList.add('open');
}

function closeModal(){document.getElementById('assetModal').classList.remove('open');}

async function saveAsset(e){
  if(e&&e.preventDefault)e.preventDefault();
  const name=document.getElementById('f_name').value.trim();
  const type=document.getElementById('f_type').value;
  const status=document.getElementById('f_status').value;
  const location=document.getElementById('f_location').value;
  const client=document.getElementById('f_client').value||session.customerId;
  const serial=document.getElementById('f_serial').value.trim();
  const zone=document.getElementById('f_zone_equipment').value.trim();
  if(!name||!type||!status||!location||!client){showToast('error','Required Fields','Please fill all required fields.');return;}
  if(!serial){showToast('error','Required','Serial Number is required.');document.getElementById('f_serial').focus();return;}
  if(!zone){showToast('error','Required','Zone of Equipment is required.');document.getElementById('f_zone_equipment').focus();return;}

  const editId=document.getElementById('editAssetId').value;
  const saveBtn=document.getElementById('saveBtn');
  const saveLbl=document.getElementById('saveBtnLabel');
  if(saveBtn){saveBtn.disabled=true;if(saveLbl)saveLbl.textContent='Saving…';}

  try{
    const payload={
      name,asset_type:type,serial_number:serial,status,
      functional_location:location,client_id:client,
      description:document.getElementById('f_notes').value||null,
    };
    if(!editId)payload.asset_number=(document.getElementById('f_assetNumber').value||'').trim().toUpperCase()||undefined;

    const editAsset=editId?ASSETS.find(a=>a.assetId===editId):null;
    const uuid=editAsset?.id||editId;
    /* ── API: POST /api/assets  OR  PATCH /api/assets/{uuid} ── */
    const url=editId?`/api/assets/${uuid}`:'/api/assets';
    const method=editId?'PATCH':'POST';

    const res=await apiFetch(url,{method,body:JSON.stringify(payload)});
    const data=await res.json();

    if(!data.success){showToast('error','Save Failed',(data.data||data).error||'Could not save asset.');return;}

    showToast('success',editId?'Updated':'Added',`"${name}" saved successfully.`);
    closeModal(true);await loadAssets();
  }catch(err){showToast('error','Network Error','Could not save asset.');}
  finally{if(saveBtn){saveBtn.disabled=false;if(saveLbl)saveLbl.textContent='Save Asset';}}
}

function openStatusModal(id){
  const a=ASSETS.find(x=>x.assetId===id);if(!a)return;
  statusTargetId=id;
  const statusDot=a.status==='operation'?'status-dot--active':'status-dot--stacked';
  const statusLabel=a.status==='operation'?'Operation':'Stacked';
  document.getElementById('statusModalAssetInfo').innerHTML=
    `<strong>${a.name}</strong> (${a.assetId})<br/><span style="color:var(--text-secondary);font-size:12px;">Current: </span><span class="status-indicator"><span class="status-dot ${statusDot}"></span>${statusLabel}</span>`;
  document.getElementById('statusNewVal').value=a.status;
  document.getElementById('statusReason').value='';
  document.getElementById('statusModal').classList.add('open');
}
function closeStatusModal(){document.getElementById('statusModal').classList.remove('open');}

async function submitStatusRequest(){
  const reason=document.getElementById('statusReason').value.trim();
  const newStatus=document.getElementById('statusNewVal').value;
  if(!reason){showToast('error','Required','Please enter a reason.');return;}
  const asset=ASSETS.find(a=>a.assetId===statusTargetId);
  const uuid=asset?.id||statusTargetId;
  try{
    /* ── API: PATCH /api/assets/{uuid} ── */
    const res=await apiFetch(`/api/assets/${uuid}`,{method:'PATCH',body:JSON.stringify({status:newStatus,notes:reason})});
    const data=await res.json();
    closeStatusModal();
    if(data.success){showToast('success','Status Updated',`Changed to "${newStatus}".`);await loadAssets();}
    else showToast('info','Request Submitted','Status change request sent to Admin.');
  }catch(err){showToast('error','Network Error','Could not submit request.');}
}

   TRANSFER LOG
   Source: Old code openTransferModal(), saveTransfer()
   Endpoints:
     PATCH /api/assets/{uuid}  (update location)
     + localStorage for transfer history log
════════════════════════════════════════════════════════════════ */
let transferTargetId=null;
function loadTransfers(){try{const s=localStorage.getItem(TRANSFER_KEY);return s?JSON.parse(s):[];}catch(e){return[];}}
function saveTransfers(t){localStorage.setItem(TRANSFER_KEY,JSON.stringify(t));}
function logTransfer(assetId,from,to,by,notes,date){if(!from||!to||from===to)return;const t=loadTransfers();t.push({assetId,from,to,by,notes:notes||'',date:date||new Date().toISOString().split('T')[0]});saveTransfers(t);}

function openTransferModal(id){
  const a=ASSETS.find(x=>x.assetId===id);if(!a)return;
  transferTargetId=id;
  const canTransfer=session.role==='admin'||session.role==='manager';
  document.getElementById('transferModalTitle').textContent=`Transfer — ${a.name}`;
  document.getElementById('transferAssetInfo').innerHTML=`
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
      <span class="id-chip">${a.assetId}</span><strong>${a.name}</strong>
      <span style="color:var(--text-secondary);">${a.type}</span>
      <span style="color:var(--text-secondary);">·</span>
      <span>Current: <strong style="color:var(--success-600);">${a.location||'—'}</strong></span>
    </div>`;
  document.getElementById('newTransferForm').style.display=canTransfer?'block':'none';

  if(canTransfer){
    document.getElementById('t_from').value=a.location||'';
    const locs=loadFuncLocs();
    let filtered=locs.filter(l=>l.name!==a.location);
    const cf=filtered.filter(l=>!l.client||l.client===a.client);
    filtered=cf.length?cf:filtered;
    document.getElementById('t_to').innerHTML='<option value="">Select…</option>'+filtered.map(l=>`<option value="${l.name}">${l.name} (${l.type})</option>`).join('');
    document.getElementById('t_date').value=new Date().toISOString().split('T')[0];
    document.getElementById('t_notes').value='';
  }
  renderTransferLog(id);
  document.getElementById('transferModal').classList.add('open');
}
function renderTransferLog(assetId){
  const all=loadTransfers().filter(t=>t.assetId===assetId).sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const tbody=document.getElementById('transferLogBody');
  const empty=document.getElementById('transferLogEmpty');
  if(!all.length){tbody.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  tbody.innerHTML=all.map(t=>`<tr>
    <td style="font-size:12px;white-space:nowrap;">${t.date||'—'}</td>
    <td style="font-size:12px;">${t.from||'—'}</td>
    <td style="font-size:12px;font-weight:600;color:var(--success-600);">${t.to||'—'}</td>
    <td style="font-size:12px;">${t.by||'—'}</td>
    <td style="font-size:12px;color:var(--text-secondary);">${h(t.notes)||'—'}</td>
  </tr>`).join('');
}
async function saveTransfer(){
  const to=document.getElementById('t_to').value;
  const date=document.getElementById('t_date').value;
  const notes=document.getElementById('t_notes').value.trim();
  const from=document.getElementById('t_from').value;
  if(!to){showToast('error','Required','Select a destination.');return;}
  if(!date){showToast('error','Required','Enter a date.');return;}
  if(to===from){showToast('error','Same Location','Destination must differ.');return;}

  const asset=ASSETS.find(a=>a.assetId===transferTargetId);
  const uuid=asset?.id||transferTargetId;
  try{
    /* ── API: PATCH /api/assets/{uuid} ── */
    const res=await apiFetch(`/api/assets/${uuid}`,{method:'PATCH',body:JSON.stringify({functional_location:to})});
    const data=await res.json();
    if(!data.success){showToast('error','Transfer Failed',(data.data||data).error||'Could not transfer.');return;}

    logTransfer(transferTargetId,from,to,session.name,notes,date);
    document.getElementById('t_from').value=to;

    /* Refresh destination dropdown */
    const locs=loadFuncLocs();
    let fR=locs.filter(l=>l.name!==to);
    const cf2=fR.filter(l=>!l.client||l.client===asset?.client);
    fR=cf2.length?cf2:fR;
    document.getElementById('t_to').innerHTML='<option value="">Select…</option>'+fR.map(l=>`<option value="${l.name}">${l.name} (${l.type})</option>`).join('');
    document.getElementById('t_notes').value='';
    renderTransferLog(transferTargetId);
    showToast('success','Transferred',`"${asset?.name}" moved to ${to}.`);
    await loadAssets();
  }catch(err){showToast('error','Network Error','Could not transfer asset.');}
}
function closeTransferModal(){document.getElementById('transferModal').classList.remove('open');transferTargetId=null;}
document.getElementById('transferModal').addEventListener('click',function(e){if(e.target===this)closeTransferModal();});

const CERTS_FALLBACK=[]; /* populated from certificates page */
function loadCertsForAsset(assetId){
  let certs=[];
  try{const raw=localStorage.getItem('sap_certs_data');if(raw)certs=JSON.parse(raw);}catch(e){}
  return certs.filter(c=>c.assetId===assetId);
}
function fmtCertId(cert){
  if(!cert||!cert.certId)return '—';
  const cn=cert.certId.replace(/^CERT-0*/i,'')||cert.certId;
  const p=cn.padStart(3,'0');
  if(!cert.jobNumber)return cert.certId;
  return `${cert.jobNumber.replace(/^JOB-/i,'')}/${p}`;
}

const IMPORT_ALL_COLS=['asset_number','name','asset_type','status','client_id','functional_location','serial_number','manufacturer','model','description','notes'];

const VALID_STATUSES=['operation','stacked'];
let _importRows=[],_importStep=1,_importFile=null,_xlsxLoaderPromise=null;

function ensureXlsxLoaded(){if(typeof XLSX!=='undefined')return Promise.resolve();if(_xlsxLoaderPromise)return _xlsxLoaderPromise;_xlsxLoaderPromise=new Promise((res,rej)=>{const s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';s.async=true;s.onload=()=>res();s.onerror=()=>rej(new Error('SheetJS not loaded'));document.head.appendChild(s);});return _xlsxLoaderPromise;}

function handleImportFile(input){const f=input.files[0];if(!f)return;_importFile=f;document.getElementById('importNextBtn').disabled=false;}

async function parseImportFile(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();const ext=file.name.split('.').pop().toLowerCase();
    reader.onerror=()=>reject(new Error('Cannot read file'));
    reader.onload=async e=>{
      try{
        let rows=[];
        if(ext==='csv'){rows=parseCSVContent(e.target.result);}
        else{
          await ensureXlsxLoaded();
          const wb=XLSX.read(e.target.result,{type:'binary'});const ws=wb.Sheets[wb.SheetNames[0]];
          const data=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
          if(!data.length){resolve([]);return;}
          const headers=data[0].map(h=>String(h).trim().toLowerCase().replace(/\s+/g,'_'));
          rows=data.slice(1).map(row=>{const obj={};headers.forEach((h,i)=>{obj[h]=String(row[i]||'').trim();});return obj;}).filter(r=>Object.values(r).some(v=>v!==''));
        }
        resolve(rows);
      }catch(err){reject(err);}
    };
    if(ext==='csv')reader.readAsText(file,'UTF-8');else reader.readAsBinaryString(file);
  });
}
function parseCSVContent(text){const lines=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n').filter(l=>l.trim());if(lines.length<2)return[];const headers=parseCsvRow(lines[0]).map(h=>h.toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,''));return lines.slice(1).map(line=>{const vals=parseCsvRow(line);const obj={};headers.forEach((h,i)=>{obj[h]=(vals[i]||'').trim();});return obj;}).filter(r=>Object.values(r).some(v=>v!==''));}
function parseCsvRow(line){const result=[];let cur='',inQ=false;for(let i=0;i<line.length;i++){const ch=line[i];if(ch==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}else if(ch===','&&!inQ){result.push(cur);cur='';}else cur+=ch;}result.push(cur);return result;}

function validateImportRows(rawRows){
  const existingNums=new Set(ASSETS.map(a=>(a.assetId||'').toLowerCase()));
  const existingSerials=new Set(ASSETS.map(a=>(a.serial||'').toLowerCase()).filter(Boolean));
  const seenBatch=new Set(),seenSerialBatch=new Set();
  return rawRows.map((row,i)=>{
    const r={rowNum:i+2,raw:row,errors:[],warnings:[],rowState:'valid',dupAction:'overwrite',selected:false,duplicateReason:null};
    const get=(...keys)=>{for(const k of keys){if(row[k]!==undefined)return String(row[k]).trim();}return '';};
    r.asset_number=get('asset_number','asset number','assetno').toUpperCase();
    r.name=get('name','asset_name','assetname');
    r.asset_type=get('asset_type','asset type','type','category');
    r.status=get('status').toLowerCase();
    r.client_id=get('client_id','client','customer_id').toUpperCase();
    r.functional_location=get('functional_location','functional location','location');
    r.serial_number=get('serial_number','serial number','serial','sn');
    r.manufacturer=get('manufacturer','make');r.model=get('model');
    r.description=get('description','desc');r.notes=get('notes','comments');

    if(!r.asset_number)r.errors.push('asset_number required');
    if(!r.name)r.errors.push('name required');
    if(!r.asset_type)r.errors.push('asset_type required');
    if(!r.status)r.errors.push('status required');
    if(!r.client_id)r.errors.push('client_id required');
    if(!r.functional_location)r.errors.push('functional_location required');
    if(!r.serial_number)r.errors.push('serial_number required');
    if(r.asset_type&&!VALID_TYPES.includes(r.asset_type))r.errors.push(`Invalid type: ${r.asset_type}`);
    if(r.status&&!VALID_STATUSES.includes(r.status))r.errors.push('status must be operation or stacked');
    if(r.errors.length){r.rowState='error';return r;}

    const key=r.asset_number.toLowerCase();const sKey=(r.serial_number||'').toLowerCase();
    const numDup=existingNums.has(key)||seenBatch.has(key);
    const serDup=Boolean(sKey&&(existingSerials.has(sKey)||seenSerialBatch.has(sKey)));
    if(numDup||serDup){
      r.rowState='duplicate';r.dupAction='overwrite';
      r.duplicateReason=numDup&&serDup?'both':serDup?'serial':'number';
    }else{seenBatch.add(key);}
    if(sKey)seenSerialBatch.add(sKey);
    if(r.rowState==='valid'&&!r.manufacturer)r.warnings.push('manufacturer empty');
    if(r.rowState==='valid'&&r.warnings.length)r.rowState='warning';
    return r;
  });
}

async function serverRevalidateRows(rows){
  try{
    /* ── API: POST /api/assets/import/validate ── */
    const payloadRows=rows.map(r=>({asset_number:r.asset_number,name:r.name,asset_type:r.asset_type,status:r.status,client_id:r.client_id,functional_location:r.functional_location,serial_number:r.serial_number,manufacturer:r.manufacturer,model:r.model}));
    const res=await apiFetch('/api/assets/import/validate',{method:'POST',body:JSON.stringify({rows:payloadRows})});
    const data=await res.json();
    return data?.data?.rows||data?.rows||[];
  }catch(e){return [];}
}
async function revalidateImportRows(){
  const serverRows=await serverRevalidateRows(_importRows);
  serverRows.forEach(sr=>{
    const row=_importRows[sr.index];if(!row)return;
    row.duplicateReason=sr.duplicate_by||row.duplicateReason||null;
    row.errors=[...new Set([...(row.errors||[]),...(sr.errors||[])])];
    row.warnings=[...new Set([...(row.warnings||[]),...(sr.warnings||[])])];
    if(row.errors.length)row.rowState='error';
    else if(sr.status==='duplicate')row.rowState='duplicate';
    else if(row.warnings.length||sr.status==='warning')row.rowState='warning';
    else{row.rowState='valid';row.duplicateReason=null;}
  });
}

function isNumberOnlyDuplicate(row){return row.rowState==='duplicate'&&row.duplicateReason==='number';}
function getNextImportAstNumber(){let max=0;const scan=v=>{const m=String(v||'').toUpperCase().match(/^AST-(\d+)$/);if(m){const n=parseInt(m[1],10);if(!isNaN(n)&&n>max)max=n;}};ASSETS.forEach(a=>scan(a.assetId));_importRows.forEach(r=>scan(r.asset_number));return `AST-${String(max+1).padStart(4,'0')}`;}

async function generateAstForRow(idx){const row=_importRows[idx];if(!row||!isNumberOnlyDuplicate(row))return;row.asset_number=getNextImportAstNumber();await revalidateImportRows();buildPreviewTable();showToast('success','Renumbered',`Row ${row.rowNum} → ${row.asset_number}`);}
async function generateAstForAllEligibleRows(){const eligible=_importRows.filter(isNumberOnlyDuplicate);if(!eligible.length){showToast('warning','None','No number-only duplicates.');return;}eligible.forEach(r=>{r.asset_number=getNextImportAstNumber();});await revalidateImportRows();buildPreviewTable();showToast('success','Renumbered',`${eligible.length} rows updated.`);}
function massSetDupAction(action){_importRows.forEach(r=>{if(r.rowState==='duplicate')r.dupAction=action;});buildPreviewTable();}

function buildPreviewTable(){
  const tbody=document.getElementById('importPreviewBody');if(!tbody)return;
  const dups=_importRows.filter(r=>r.rowState==='duplicate');
  const dupBar=document.getElementById('importDupBar');
  if(dups.length){dupBar.classList.add('visible');document.getElementById('importDupCount').textContent=`${dups.length} duplicate row${dups.length>1?'s':''}.`;}
  else dupBar.classList.remove('visible');

  tbody.innerHTML=_importRows.map((r,i)=>{
    const cls=`preview-row--${r.rowState}`;
    const st=r.rowState==='valid'?`<span class="row-status row-status--ok">✓ Valid</span>`
      :r.rowState==='warning'?`<span class="row-status row-status--dup">⚠ Warning</span>`
      :r.rowState==='duplicate'?`<span class="row-status row-status--dup">⚠ Duplicate</span>`
      :`<span class="row-status row-status--error">✗ Error</span>`;
    const act=r.rowState==='duplicate'?`<select class="dup-select" onchange="setDupAction(${i},this.value)"><option value="overwrite" ${r.dupAction==='overwrite'?'selected':''}>Overwrite</option><option value="skip" ${r.dupAction==='skip'?'selected':''}>Skip</option></select>${isNumberOnlyDuplicate(r)?`<button class="btn-text" onclick="generateAstForRow(${i})" style="height:22px;font-size:10px;padding:0 6px;margin-top:4px;">New AST</button>`:''}`
      :r.rowState==='error'?`<div class="cell-error">${r.errors.map(e=>h(e)).join('<br/>')}</div>`
      :r.rowState==='warning'?`<div class="cell-error" style="color:var(--warning-600);">${r.warnings.map(e=>h(e)).join('<br/>')}</div>`:'';
    const cols=['asset_number','name','asset_type','status','client_id','functional_location','serial_number','manufacturer','model','description','notes'];
    return `<tr class="${cls}"><td style="text-align:center;"><input type="checkbox" class="chk" style="width:12px;height:12px;" ${r.selected?'checked':''}/></td><td style="text-align:center;color:var(--text-tertiary);font-size:11px;">${r.rowNum}</td><td>${st}</td>${cols.map(c=>`<td title="${h(r[c]||'')}">${h(r[c]||'')}</td>`).join('')}<td>${act}</td></tr>`;
  }).join('');
  updateImportSummary();
}
function setDupAction(idx,val){_importRows[idx].dupAction=val;updateImportFooter();}
function importToggleSelectAll(cb){_importRows.forEach(r=>{if(r.rowState!=='error')r.selected=cb.checked;});document.getElementById('importSelectAllChk').checked=cb.checked;buildPreviewTable();}
function updateImportSummary(){
  const t=_importRows.length,ok=_importRows.filter(r=>r.rowState==='valid').length,err=_importRows.filter(r=>r.rowState==='error').length,dup=_importRows.filter(r=>r.rowState==='duplicate').length;

    <div class="import-stat import-stat--ok">✓ ${ok} valid</div>

  const n=_importRows.filter(r=>r.rowState!=='error'&&!(r.rowState==='duplicate'&&r.dupAction==='skip')).length;

/* Override importGoStep to handle step 1→2 parsing */
const _baseImportGoStep=importGoStep;
importGoStep=async function(n){
  if(n===2){
    if(!_importFile){showToast('error','No File','Select a file first.');return;}
    const btn=document.getElementById('importNextBtn');btn.disabled=true;btn.innerHTML='<span class="btn-text">Parsing…</span>';
    try{
      const raw=await parseImportFile(_importFile);
      if(!raw.length){showToast('error','Empty','No data rows found.');btn.disabled=false;btn.innerHTML='Preview';return;}
      _importRows=validateImportRows(raw);
      await revalidateImportRows();
    }catch(err){showToast('error','Parse Error',err.message);btn.disabled=false;btn.innerHTML='Preview';return;}
    btn.disabled=false;btn.innerHTML='Preview';
  }
  _importStep=n;
  ['importPanel1','importPanel2','importPanel3'].forEach((id,i)=>{document.getElementById(id).style.display=(i===n-1)?'block':'none';});
  [1,2,3].forEach(i=>{const el=document.getElementById('importStep'+i);el.classList.remove('active','done');if(i<n)el.classList.add('done');else if(i===n)el.classList.add('active');});
  document.getElementById('importNextBtn').style.display=(n===1)?'inline-flex':'none';
  document.getElementById('importBackBtn').style.display=(n===2)?'inline-flex':'none';
  document.getElementById('importConfirmBtn').style.display=(n===2)?'inline-flex':'none';
  const cancelBtn=document.querySelector('#importModalFooter .modal-btn');
  if(cancelBtn)cancelBtn.style.display=(n<3)?'inline-flex':'none';
  if(n===2){buildPreviewTable();updateImportFooter();}
};

async function runImport(){
  await revalidateImportRows();
  const toImport=_importRows.filter(r=>r.rowState!=='error'&&!(r.rowState==='duplicate'&&r.dupAction==='skip'));
  if(!toImport.length){showToast('warning','Nothing','All rows invalid or skipped.');return;}

  /* Switch to step 3 */
  _importStep=3;
  ['importPanel1','importPanel2','importPanel3'].forEach((id,i)=>{document.getElementById(id).style.display=(i===2)?'block':'none';});
  [1,2,3].forEach(i=>{const el=document.getElementById('importStep'+i);el.classList.remove('active','done');if(i<3)el.classList.add('done');else el.classList.add('active');});
  document.getElementById('importNextBtn').style.display='none';
  document.getElementById('importBackBtn').style.display='none';
  document.getElementById('importConfirmBtn').style.display='none';
  const cancelBtn=document.querySelector('#importModalFooter .modal-btn');if(cancelBtn)cancelBtn.style.display='none';

  const fill=document.getElementById('importProgressFill');
  const label=document.getElementById('importProgressLabel');
  const resultMsg=document.getElementById('importResultMsg');
  const total=toImport.length;let done=0,succeeded=0,failed=0;const failedNums=[];
  label.textContent=`Importing ${total} rows…`;

  const BATCH=50;
  for(let i=0;i<toImport.length;i+=BATCH){
    const batch=toImport.slice(i,i+BATCH);
    const results=await Promise.allSettled(batch.map(p=>{
      const {_overwrite,...body}={...p,_overwrite:p.rowState==='duplicate'&&p.dupAction==='overwrite'};
      if(_overwrite){
        /* ── API: PATCH /api/assets/{asset_number} ── */
        return apiFetch('/api/assets/'+encodeURIComponent(p.asset_number),{method:'PATCH',body:JSON.stringify(body)}).then(r=>r.json());
      }else{
        /* ── API: POST /api/assets ── */
        return apiFetch('/api/assets',{method:'POST',body:JSON.stringify(body)}).then(r=>r.json());
      }
    }));
    results.forEach((res,j)=>{
      done++;fill.style.width=Math.round((done/total)*100)+'%';label.textContent=`Importing… ${done}/${total}`;
      if(res.status==='fulfilled'&&res.value?.success){
        succeeded++;
        const b=batch[j];const localRow={assetId:b.asset_number,asset_number:b.asset_number,name:b.name,type:b.asset_type,asset_type:b.asset_type,status:b.status,client:b.client_id,client_id:b.client_id,location:b.functional_location||'',serial:b.serial_number||'',notes:b.notes||'',description:b.description||''};
        const existIdx=ASSETS.findIndex(a=>(a.assetId||'').toUpperCase()===b.asset_number.toUpperCase());
        if(existIdx>-1)ASSETS[existIdx]={...ASSETS[existIdx],...localRow};else ASSETS.push(localRow);
      }else{failed++;failedNums.push(batch[j].asset_number);}
    });
  }
  fill.style.width='100%';
  let msg='';
  if(succeeded)msg+=`<div style="color:var(--success-600);font-weight:700;font-size:16px;margin-bottom:8px;">✓ ${succeeded} imported</div>`;
  if(failed)msg+=`<div style="color:var(--danger-600);font-size:13px;">✗ ${failed} failed: ${failedNums.slice(0,8).join(', ')}${failedNums.length>8?'…':''}</div>`;
  msg+=`<div style="margin-top:16px;display:flex;gap:8px;justify-content:center;"><button class="modal-btn modal-btn--success" onclick="closeImportModal();loadAssets();">View Assets</button><button class="modal-btn" onclick="closeImportModal()">Close</button></div>`;
  resultMsg.innerHTML=msg;label.textContent='Done!';
  if(succeeded)await loadAssets();
}

/* ═══════════════════════════════════════════════════════════════

function showToast(type,title,msg){
  const icons={
    success:'<polyline points="22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>',
    error:'<circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>',
    warning:'<path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>',
    info:'<circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12.01" y2="16"/><line x1="12" y1="8" x2="12" y2="12"/>',
  };
  const c=document.getElementById('toastContainer');
  const t=document.createElement('div');
  t.className=`toast toast--${type}`;
  t.innerHTML=`<div class="toast__icon"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">${icons[type]}</svg></div><div class="toast__body"><div class="toast__title">${title}</div><div class="toast__msg">${msg}</div></div><button class="toast__close" onclick="this.parentElement.remove()"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>`;
  c.appendChild(t);
  setTimeout(()=>{if(t.parentElement)t.remove();},4500);
}

document.addEventListener('DOMContentLoaded',()=>{
  const pss=document.getElementById('pageSizeSelect');
  if(pss)pss.value=String(PAGE_SIZE);

  session=getSession();
  if(!session)return;

  const role=session.role;

  /* Shell avatar */
  const initials=session.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  document.getElementById('shellAvatar').textContent=initials;
  document.getElementById('menuUserName').textContent=session.name;
  const rl={admin:'Administrator',manager:'Manager',technician:'Technician',user:'User'};
  document.getElementById('menuUserRole').textContent=rl[role]||role;

  /* Nav visibility */
  if(role!=='admin'){
    document.getElementById('adminSection').style.display='none';
    document.getElementById('adminClientsLink').style.display='none';
  }
  if(role!=='admin'&&role!=='manager'){
    const il=document.getElementById('inspectorsLink');if(il)il.style.display='none';
    const fl=document.getElementById('funcLocsLink');if(fl)fl.style.display='none';
  }else if(role==='manager'){
    document.getElementById('adminSection').style.display='';
    const fl2=document.getElementById('funcLocsLink');if(fl2)fl2.style.display='none';
  }

  /* Client filter + import button visibility */
  if(role==='admin'||role==='manager')document.getElementById('clientFilter').style.display='inline-block';
  else document.getElementById('clientFilter').style.display='none';
  const impBtn=document.getElementById('importBtn');
  if(impBtn&&role!=='admin')impBtn.style.display='none';

  /* Page subtitle */
  if(session.customerId)document.getElementById('pageSubtitle').textContent=`Client ${session.customerId} — assigned assets`;

  /* Header actions */
  const ha=document.getElementById('headerActions');
  if(role==='admin'||role==='manager'){
    ha.innerHTML=`<button class="btn-primary" onclick="openAddModal()"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg><span>Add Asset</span></button>`;
  }else if(role==='technician'){
    ha.innerHTML=`<span style="display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--warning-600);background:var(--warning-50);padding:6px 14px;border-radius:var(--radius-md);"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="width:14px;height:14px;"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>Status changes require approval</span>`;
  }else{
    ha.innerHTML=`<span style="font-size:12px;font-weight:600;color:var(--text-tertiary);background:var(--surface-2);padding:6px 14px;border-radius:var(--radius-md);">Read-Only</span>`;
  }

  /* Notification badge */
  if(role!=='user')document.getElementById('notifBadge').style.display='block';

  loadColState();

  /* ── BOOT SEQUENCE: clients + locations in parallel, then assets ── */
  Promise.all([loadClients(),loadFuncLocsFromAPI()]).then(()=>loadAssets());
});
