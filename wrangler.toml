# wrangler.toml — Rigways ACM

name                   = "rigways-acm"
pages_build_output_dir = "."
compatibility_date     = "2024-09-23"
compatibility_flags    = ["nodejs_compat"]

[vars]
CORS_ALLOW_ORIGIN     = "https://rigways.pages.dev"
DISABLE_HASH_ENDPOINT = "false"
JWT_EXPIRES_SEC       = "86400"

# SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY, SUPABASE_ANON_KEY, JWT_SECRET
# are set as encrypted secrets via Cloudflare Dashboard
# Pages → Settings → Environment Variables → Add as "Secret" type

# ── Web Push (VAPID) ──
# Generate keys:  npx web-push generate-vapid-keys
# Set VAPID_PUBLIC_KEY below, then set these as secrets:
#   wrangler secret put VAPID_PRIVATE_KEY
#   wrangler secret put VAPID_SUBJECT    (e.g. "mailto:admin@rigways.com")
VAPID_PUBLIC_KEY      = ""

# ── Cron Trigger — daily certificate expiry check at 8 AM UTC ──
[triggers]
crons = ["0 8 * * *"]

# ── R2 Bucket — certificate file storage ──
[[r2_buckets]]
binding     = "CERT_BUCKET"
bucket_name = "rigways-certs"
